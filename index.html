<!DOCTYPE html>
<html lang="ko">
<head>
<script>
(function() {
  var host = window.location.hostname;
  var ok = /^100\.(6[4-9]|[7-9]\d|1[01]\d|12[0-7])\./.test(host)||host.endsWith('.ts.net')||host==='localhost'||host==='127.0.0.1';
  if (!ok) document.addEventListener('DOMContentLoaded', function() {
    document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:#0f0f1a;color:#e0e0ff;font-family:sans-serif;text-align:center;padding:20px"><div><div style="font-size:56px;margin-bottom:16px">🔒</div><h1 style="font-size:22px;font-weight:700;color:#a78bfa;margin-bottom:12px">접근 제한됨</h1><p style="color:#555580;font-size:14px;line-height:1.6">Tailscale VPN 연결 후 이용 가능합니다</p></div></div>';
  });
})();
</script>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#1a1a2e"><link rel="manifest" href="/manifest.json"><title>훈희봇</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0f0f1a;--card:#1a1a2e;--border:#2d2d4e;--p:#7c3aed;--pl:#a78bfa;--g:#34d399;--r:#f87171;--b:#7dd3fc;--t:#e0e0ff;--m:#7c85a0;--m2:#555580}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;display:flex;flex-direction:column}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;overflow-x:auto}
.tab{flex:1;min-width:60px;padding:13px 6px;text-align:center;font-size:.68rem;font-weight:600;color:var(--m);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--pl);border-bottom-color:var(--p)}
.page{display:none;flex:1;padding:14px;flex-direction:column;gap:12px;overflow-y:auto}
.page.active{display:flex}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}
.ct{font-size:.72rem;font-weight:700;color:var(--m);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.sr{display:flex;align-items:center;gap:10px}
.dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;animation:none}
.dot.g{background:var(--g);box-shadow:0 0 5px var(--g)}
.dot.r{background:var(--r);box-shadow:0 0 5px var(--r)}
.dot.y{background:#fbbf24;box-shadow:0 0 5px #fbbf24}
.btn{border:none;border-radius:12px;cursor:pointer;font-size:.9rem;font-weight:600;padding:12px 16px;transition:all .15s;width:100%}
.btn:active{transform:scale(.97)}
.bp{background:linear-gradient(135deg,var(--p),#4f46e5);color:#fff}
.bd{background:linear-gradient(135deg,#dc2626,#b91c1c);color:#fff}
.bs{background:linear-gradient(135deg,#059669,#0d9488);color:#fff}
.bv{background:linear-gradient(135deg,#059669,#0d9488);color:#fff;font-size:1rem}
.bv.on{background:linear-gradient(135deg,#dc2626,#b91c1c);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 #dc262660}50%{box-shadow:0 0 0 10px #dc262600}}
.btn:disabled{opacity:.4;cursor:not-allowed}
.bsm{padding:6px 10px;font-size:.72rem;border-radius:8px;width:auto;background:none;border:1px solid var(--border);color:var(--m)}
textarea{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;color:var(--t);font-size:.95rem;padding:12px 14px;resize:vertical;min-height:80px;width:100%;outline:none}
textarea:focus{border-color:var(--p)}
textarea::placeholder{color:var(--m2)}
.ms{text-align:center;font-size:.82rem;min-height:18px;color:var(--m)}
.ms.ok{color:var(--g)}.ms.er{color:var(--r)}
.li{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.li:last-child{border-bottom:none;padding-bottom:0}
.lib{flex:1;min-width:0}
.lit{font-size:.84rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lis{font-size:.72rem;color:var(--m);margin-top:2px}
.badge{display:inline-block;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:6px}
.bg{background:#064e3b;color:var(--g)}.bb{background:#1e3a5f;color:var(--b)}.by{background:#451a03;color:#fbbf24}
.tc{width:18px;height:18px;border-radius:5px;border:2px solid var(--border);flex-shrink:0;margin-top:2px;display:flex;align-items:center;justify-content:center;font-size:.7rem}
.tc.done{background:var(--g);border-color:var(--g);color:#fff}
.tt{font-size:.84rem}.tt.done{color:var(--m2);text-decoration:line-through}
.loading{text-align:center;color:var(--m);font-size:.82rem;padding:16px}
.fi{background:var(--bg);border:1.5px solid var(--border);border-radius:10px;color:var(--t);font-size:.88rem;padding:10px 12px;width:100%;outline:none}
.fi:focus{border-color:var(--p)}
.fl{font-size:.78rem;color:var(--m);display:block;margin-bottom:4px}
/* 시스템 게이지 */
.gauge-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.gauge-label{font-size:.75rem;color:var(--m);width:40px;flex-shrink:0}
.gauge-bar{flex:1;background:#1e293b;border-radius:4px;height:8px;overflow:hidden}
.gauge-fill{height:100%;border-radius:4px;transition:width .3s}
.gauge-val{font-size:.75rem;color:var(--t);width:36px;text-align:right;flex-shrink:0}
</style>
</head>
<body>
<nav class="tabs">
  <div class="tab active" onclick="sw('chat')" id="tab-chat">💬 채팅</div>
  <div class="tab" onclick="sw('system')" id="tab-system">🖥 시스템</div>
  <div class="tab" onclick="sw('agents')" id="tab-agents">🤖 에이전트</div>
  <div class="tab" onclick="sw('todos')" id="tab-todos">✅ 할 일</div>
  <div class="tab" onclick="sw('settings')" id="tab-settings">⚙️ 설정</div>
</nav>

<!-- 채팅 -->
<div class="page active" id="page-chat">
  <button class="btn bv" id="voiceBtn" onclick="toggleVoice()">🎤 음성 입력</button>
  <textarea id="msgInput" placeholder="메시지를 입력하거나 음성 버튼을 누르세요..."></textarea>
  <button class="btn bp" id="sendBtn" onclick="sendMsg()">📤 전송</button>
  <p class="ms" id="chatStatus"></p>
</div>

<!-- 시스템 -->
<div class="page" id="page-system">
  <div class="card">
    <div class="ct">OpenClaw <button class="bsm" onclick="loadStatus()">↻</button></div>
    <div id="ocStatus" class="loading">로딩 중...</div>
    <div id="restartWrap" style="display:none;margin-top:10px">
      <button class="btn bd" id="restartBtn" onclick="restartOC()">🔄 OpenClaw 재시작</button>
    </div>
  </div>
  <div class="card">
    <div class="ct">Mac mini 리소스 <button class="bsm" onclick="loadSystem()">↻</button></div>
    <div id="sysContent" class="loading">로딩 중...</div>
  </div>
</div>

<!-- 에이전트 -->
<div class="page" id="page-agents">
  <div class="card">
    <div class="ct">진행 중인 작업 <button class="bsm" onclick="loadAgents()">↻</button></div>
    <div id="agentsContent" class="loading">로딩 중...</div>
  </div>
</div>

<!-- 할 일 -->
<div class="page" id="page-todos">
  <div class="card">
    <div class="ct">진행 중 <button class="bsm" onclick="loadTodos()">↻</button></div>
    <div id="todoPending" class="loading">로딩 중...</div>
  </div>
  <div class="card">
    <div class="ct">완료됨</div>
    <div id="todoDone" class="loading">로딩 중...</div>
  </div>
</div>

<!-- 설정 -->
<div class="page" id="page-settings">
  <div class="card">
    <div class="ct">Slack 설정</div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div><label class="fl">Bot Token (xoxb-...)</label><input type="password" class="fi" id="cfgToken" placeholder="xoxb-..."></div>
      <div><label class="fl">Channel ID</label><input type="text" class="fi" id="cfgChannel" placeholder="C0AJLQUM2KA"></div>
      <button class="btn bp" onclick="saveSettings()">💾 저장</button>
      <p class="ms" id="settingsStatus"></p>
    </div>
  </div>
  <div class="card">
    <div class="ct">서버</div>
    <div style="font-size:.78rem;color:var(--m);line-height:2">
      🌐 <span style="color:var(--t)">jeonghunhuiui-macmini.tail82ec06.ts.net</span><br>
      🔌 API: <span style="color:var(--t)">:8443</span> &nbsp;🔒 Tailscale 전용
    </div>
  </div>
</div>

<script>
var API='https://jeonghunhuiui-macmini.tail82ec06.ts.net:8443';
var recognition=null,listening=false;

function sw(n){
  document.querySelectorAll('.tab,.page').forEach(function(e){e.classList.remove('active')});
  document.getElementById('tab-'+n).classList.add('active');
  document.getElementById('page-'+n).classList.add('active');
  if(n==='system'){loadStatus();loadSystem();}
  if(n==='agents'){loadAgents();}
  if(n==='todos'){loadTodos();}
  if(n==='settings'){loadSettingsUI();}
}

// ── 시스템 상태 ──────────────────────────────────────────────────────────────
async function loadStatus(){
  var el=document.getElementById('ocStatus'),w=document.getElementById('restartWrap');
  el.innerHTML='<span class="loading">확인 중...</span>';
  try{
    var d=await (await fetch(API+'/dashboard/status')).json();
    var ok=d.ok&&d.gateway;
    el.innerHTML='<div class="sr"><div class="dot '+(ok?'g':'r')+'"></div><span style="font-size:.9rem;font-weight:600">'+(ok?'정상 동작 중':'응답 없음')+'</span>'+(d.pid?'<span style="font-size:.73rem;color:var(--m);margin-left:auto">PID '+d.pid+'</span>':'')+' </div>';
    w.style.display=ok?'none':'block';
  }catch(e){
    el.innerHTML='<div class="sr"><div class="dot r"></div><span style="font-size:.9rem;font-weight:600">연결 실패</span></div>';
    w.style.display='block';
  }
}

async function loadSystem(){
  var el=document.getElementById('sysContent');
  el.innerHTML='<span class="loading">로딩 중...</span>';
  try{
    var d=await (await fetch(API+'/dashboard/system')).json();
    function gauge(label,pct,val){
      var c=pct>85?'#ef4444':pct>60?'#fbbf24':'#34d399';
      return '<div class="gauge-row"><span class="gauge-label">'+label+'</span><div class="gauge-bar"><div class="gauge-fill" style="width:'+pct+'%;background:'+c+'"></div></div><span class="gauge-val">'+val+'</span></div>';
    }
    el.innerHTML=gauge('CPU',d.cpu,d.cpu+'%')+gauge('RAM',d.mem,d.memUsed+'/'+ d.memTotal+'G')+(d.disk?gauge('Disk',parseInt(d.disk.pct),d.disk.pct):'')+
      '<div style="font-size:.75rem;color:var(--m);margin-top:8px">⏱ 업타임: '+d.uptime+'</div>';
  }catch(e){el.innerHTML='<p style="color:var(--r);font-size:.82rem;padding:8px">로딩 실패</p>';}
}

async function restartOC(){
  var btn=document.getElementById('restartBtn');
  btn.disabled=true;btn.textContent='⏳ 재시작 중...';
  try{await fetch(API+'/dashboard/restart',{method:'POST'});}catch(e){}
  setTimeout(function(){loadStatus();btn.disabled=false;btn.textContent='🔄 OpenClaw 재시작';},4000);
}

// ── 에이전트 ─────────────────────────────────────────────────────────────────
async function loadAgents(){
  var el=document.getElementById('agentsContent');
  el.innerHTML='<span class="loading">로딩 중...</span>';
  try{
    var d=await (await fetch(API+'/dashboard/sessions')).json();
    var ss=d.sessions||[];
    if(!ss.length){el.innerHTML='<p class="loading">진행 중인 작업 없음</p>';return;}
    el.innerHTML=ss.map(function(s){
      var isActive=s.state==='active'||!s.state;
      return '<div class="li"><div style="font-size:1.1rem">'+(isActive?'🔄':'✅')+'</div><div class="lib"><div class="lit">'+(s.label||s.key||s.id||'Session')+'</div><div class="lis">'+(s.kind||'agent')+(s.model?' · '+s.model.split('/').pop():'')+(s.lastMessageAt?' · '+fmtTime(s.lastMessageAt):'')+' </div></div><span class="badge '+(isActive?'bg':'bb')+'">'+(isActive?'진행중':'완료')+'</span></div>';
    }).join('');
  }catch(e){el.innerHTML='<p style="color:var(--r);font-size:.82rem;padding:8px">조회 실패</p>';}
}

function fmtTime(t){
  if(!t)return '';
  var d=new Date(t*1000||t),now=new Date(),diff=Math.floor((now-d)/1000);
  if(diff<60)return diff+'초 전';if(diff<3600)return Math.floor(diff/60)+'분 전';
  return Math.floor(diff/3600)+'시간 전';
}

// ── 할 일 ────────────────────────────────────────────────────────────────────
async function loadTodos(){
  var pe=document.getElementById('todoPending'),de=document.getElementById('todoDone');
  pe.innerHTML=de.innerHTML='<span class="loading">로딩 중...</span>';
  try{
    var d=await (await fetch(API+'/dashboard/todos')).json();
    pe.innerHTML=(d.pending||[]).length?d.pending.map(function(t){return '<div class="li"><div class="tc"></div><div class="lib"><div class="tt">'+esc(t)+'</div></div></div>';}).join(''):'<p class="loading">모두 완료됐어요! 🎉</p>';
    de.innerHTML=(d.done||[]).length?d.done.map(function(t){return '<div class="li"><div class="tc done">✓</div><div class="lib"><div class="tt done">'+esc(t)+'</div></div></div>';}).join(''):'<p class="loading">완료 항목 없음</p>';
  }catch(e){pe.innerHTML=de.innerHTML='<p style="color:var(--r);font-size:.82rem;padding:8px">로딩 실패</p>';}
}

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── 채팅 ─────────────────────────────────────────────────────────────────────
async function sendMsg(){
  var token=localStorage.getItem('slack_token'),channel=localStorage.getItem('slack_channel');
  var text=document.getElementById('msgInput').value.trim();
  if(!token||!channel){csS('설정에서 토큰과 채널을 먼저 입력하세요','er');sw('settings');return;}
  if(!text){csS('메시지를 입력하세요','er');return;}
  var btn=document.getElementById('sendBtn');btn.disabled=true;csS('전송 중...');
  try{
    var r=await fetch('https://slack.com/api/chat.postMessage',{method:'POST',headers:{'Authorization':'Bearer '+token,'Content-Type':'application/json'},body:JSON.stringify({channel:channel,text:text,as_user:true})});
    var d=await r.json();
    if(d.ok){csS('✓ 전송 완료!','ok');document.getElementById('msgInput').value='';}
    else csS('오류: '+d.error,'er');
  }catch(e){csS('네트워크 오류','er');}
  btn.disabled=false;
}
function csS(m,c){var s=document.getElementById('chatStatus');s.textContent=m;s.className='ms '+(c||'');}

window.HunhuiNativeCallback={
  onVoiceResult:function(t){document.getElementById('msgInput').value=t;csS('인식 완료','ok');svUI();},
  onVoiceError:function(e){csS('음성 오류: '+e,'er');svUI();},
  onVoiceStateChanged:function(s){if(s==='listening')startVUI();else svUI();}
};
function toggleVoice(){
  if(listening){stopVoice();return;}
  if(typeof window.HunhuiNative!=='undefined'){window.HunhuiNative.startVoice();return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){csS('음성 인식 미지원','er');return;}
  recognition=new SR();recognition.lang='ko-KR';recognition.interimResults=false;
  recognition.onstart=startVUI;
  recognition.onresult=function(e){document.getElementById('msgInput').value=e.results[0][0].transcript;csS('인식 완료','ok');};
  recognition.onerror=function(e){csS('오류: '+e.error,'er');};
  recognition.onend=svUI;
  recognition.start();
}
function stopVoice(){if(typeof window.HunhuiNative!=='undefined')window.HunhuiNative.stopVoice();if(recognition){try{recognition.stop();}catch(e){}recognition=null;}svUI();}
function startVUI(){listening=true;var b=document.getElementById('voiceBtn');b.textContent='🔴 듣는 중... (탭하면 중지)';b.classList.add('on');}
function svUI(){listening=false;var b=document.getElementById('voiceBtn');b.textContent='🎤 음성 입력';b.classList.remove('on');}

function loadSettingsUI(){document.getElementById('cfgToken').value=localStorage.getItem('slack_token')||'';document.getElementById('cfgChannel').value=localStorage.getItem('slack_channel')||'';}
function saveSettings(){
  localStorage.setItem('slack_token',document.getElementById('cfgToken').value.trim());
  localStorage.setItem('slack_channel',document.getElementById('cfgChannel').value.trim());
  var s=document.getElementById('settingsStatus');s.textContent='저장됨 ✓';s.className='ms ok';
  setTimeout(function(){s.textContent='';s.className='ms';},2000);
}
document.getElementById('msgInput').addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
if('serviceWorker' in navigator)navigator.serviceWorker.register('/sw.js').catch(function(){});
</script>
</body>
</html>
